<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dez Moedas</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
        <h1>💰 Dez Moedas</h1>
        <p>O teu sistema financeiro pessoal</p>
    </header>

    <main>

        <section class="card dashboard">
            <h2>📊 Dashboard</h2>

            <div class="stats">
                <div class="stat-box">
                    <span>Receitas</span>
                    <strong id="incomeTotal">0 €</strong>
                </div>

                <div class="stat-box">
                    <span>Despesas</span>
                    <strong id="expenseTotal">0 €</strong>
                </div>

                <div class="stat-box">
                    <span>Património</span>
                    <strong id="netWorth">0 €</strong>
                </div>
            </div>
        </section>
<section class="card">
    <h2>➕ Nova Receita</h2>
<section class="card">
    <h2>➖ Nova Despesa</h2>

    <input
        type="number"
        id="expenseInput"
        placeholder="Valor da despesa"
        style="width:100%;padding:10px;margin-bottom:10px;"
    >

    <button
        onclick="addExpense()"
        style="width:100%;padding:12px;"
    >
        Adicionar Despesa
    </button>
</section>
    <input
        type="number"
        id="salaryInput"
        placeholder="Valor da receita"
        style="width:100%;padding:10px;margin-bottom:10px;"
    >

    <button
        onclick="addSalary()"
        style="width:100%;padding:12px;"
    >
        Adicionar Receita
    </button>
</section>
        <section class="card">
            <h2>💳 Carteiras</h2>

            <div id="walletList"></div>
        </section>

    </main>

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/wallets.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
